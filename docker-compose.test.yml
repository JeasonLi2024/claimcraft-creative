# ============================================================
# 测试环境 Compose 配置（仅应用容器）
# ------------------------------------------------------------
# v2 架构变更（2026-07-19）：
#   - 不再启动独立的 MySQL/PG 容器，复用 docker-compose.db.yml 的共享实例
#   - 测试侧使用共享实例中的独立逻辑库与独立用户：
#       MySQL:    claimcraft_test 库 / claimcraft_test 用户
#       PostgreSQL: claimcraft_test_checkpoints 库 / claimcraft_test 用户
#   - 通过 external network 接入 claimcraft-db_default
#   - 测试镜像仍用独立 tag claimcraft-test-*:latest，可按需启停
#
# 启动前置：
#   1) sudo docker compose -f docker-compose.db.yml -p claimcraft-db up -d
#   2) 首次需执行 bash scripts/init-shared-db.sh 创建测试库与用户、克隆数据
#
# 启动:
#   sudo docker compose -f docker-compose.test.yml -p claimcraft-test up -d
# 访问: http://<服务器IP>:8081/
# 停止: sudo docker compose -f docker-compose.test.yml -p claimcraft-test down
# ============================================================

services:
  backend:
    # 测试侧独立镜像 tag，重建不会覆盖正式侧 claimcraft-creative-backend:YYYYMMDD
    image: claimcraft-test-backend:latest
    container_name: claimcraft-test-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=${SECRET_KEY:-claimcraft-prod-secret-change-me}
      - DJANGO_ALLOWED_HOSTS=*
      # 业务数据库（共享 MySQL 实例的 claimcraft_test 库）
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=claimcraft_test
      - DB_USER=claimcraft_test
      - DB_PASSWORD=${DB_PASSWORD_TEST:-claimcraft_test_2025}
      # 文本 LLM 配置
      - LLM_PROVIDER=${LLM_PROVIDER:-siliconflow}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-30}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-3}
      # OCR 视觉 LLM 配置（独立于文本 LLM，不填则回退到 LLM_*）
      - LLM_OCR_PROVIDER=${LLM_OCR_PROVIDER:-siliconflow}
      - LLM_OCR_API_KEY=${LLM_OCR_API_KEY:-}
      - LLM_OCR_API_KEY_PP=${LLM_OCR_API_KEY_PP:-}
      - LLM_OCR_BASE_URL=${LLM_OCR_BASE_URL:-}
      - LLM_OCR_MODEL=${LLM_OCR_MODEL:-deepseek-ai/DeepSeek-OCR}
      - LLM_OCR_TEMPERATURE=${LLM_OCR_TEMPERATURE:-0.1}
      - LLM_OCR_TIMEOUT=${LLM_OCR_TIMEOUT:-60}
      - LLM_OCR_MAX_RETRIES=${LLM_OCR_MAX_RETRIES:-3}
      - LLM_OCR_PROMPT=${LLM_OCR_PROMPT:-}
      - LLM_OCR_MAX_IMAGE_MB=${LLM_OCR_MAX_IMAGE_MB:-10}
      # 视觉预分类+摘要 (Qwen3-Omni Captioner)
      - LLM_CAPTIONER_PROVIDER=${LLM_CAPTIONER_PROVIDER:-siliconflow}
      - LLM_CAPTIONER_API_KEY=${LLM_CAPTIONER_API_KEY:-}
      - LLM_CAPTIONER_BASE_URL=${LLM_CAPTIONER_BASE_URL:-https://api.siliconflow.cn/v1}
      - LLM_CAPTIONER_MODEL=${LLM_CAPTIONER_MODEL:-Qwen/Qwen3-Omni-30B-A3B-Captioner}
      - LLM_CAPTIONER_TEMPERATURE=${LLM_CAPTIONER_TEMPERATURE:-0.1}
      - LLM_CAPTIONER_TIMEOUT=${LLM_CAPTIONER_TIMEOUT:-30}
      - LLM_CAPTIONER_MAX_RETRIES=${LLM_CAPTIONER_MAX_RETRIES:-2}
      # PaddleOCR-VL 云端 OCR 配置（aistudio 高精度文档识别）
      - PADDLEOCR_VL_TOKEN=${PADDLEOCR_VL_TOKEN:-}
      - PADDLEOCR_VL_BASE_URL=${PADDLEOCR_VL_BASE_URL:-}
      - PADDLEOCR_VL_MODEL=${PADDLEOCR_VL_MODEL:-PaddleOCR-VL-1.6}
      - PADDLEOCR_VL_USE_DOC_ORIENTATION=${PADDLEOCR_VL_USE_DOC_ORIENTATION:-false}
      - PADDLEOCR_VL_USE_DOC_UNWARPING=${PADDLEOCR_VL_USE_DOC_UNWARPING:-false}
      - PADDLEOCR_VL_USE_CHART_RECOGNITION=${PADDLEOCR_VL_USE_CHART_RECOGNITION:-false}
      - PADDLEOCR_VL_POLL_INTERVAL=${PADDLEOCR_VL_POLL_INTERVAL:-3}
      - PADDLEOCR_VL_POLL_TIMEOUT=${PADDLEOCR_VL_POLL_TIMEOUT:-300}
      - PADDLEOCR_VL_REQUEST_TIMEOUT=${PADDLEOCR_VL_REQUEST_TIMEOUT:-30}
      # LangExtract（基于 Qwen3 的信息抽取，字段抽取首选）
      - LANGEXTRACT_API_KEY=${LANGEXTRACT_API_KEY:-}
      - LANGEXTRACT_BASE_URL=${LANGEXTRACT_BASE_URL:-https://api.siliconflow.cn/v1}
      - LANGEXTRACT_PROVIDER=${LANGEXTRACT_PROVIDER:-openai}
      - LANGEXTRACT_MODEL=${LANGEXTRACT_MODEL:-Qwen/Qwen3-32B}
      - LANGEXTRACT_PASSES=${LANGEXTRACT_PASSES:-1}
      - LANGEXTRACT_PROMPT=${LANGEXTRACT_PROMPT:-}
      # LLM 通用调用参数（跨场景共享的重试/超时配置）
      - LLM_COMMON_RETRY_MAX_ATTEMPTS=${LLM_COMMON_RETRY_MAX_ATTEMPTS:-3}
      - LLM_COMMON_RETRY_WAIT_MIN=${LLM_COMMON_RETRY_WAIT_MIN:-2}
      - LLM_COMMON_RETRY_WAIT_MAX=${LLM_COMMON_RETRY_WAIT_MAX:-10}
      # OCR 引擎配置
      - OCR_STRATEGIES=${OCR_STRATEGIES:-paddleocr_vl,llm_vision,paddleocr,mock}
      - OCR_PADDLEOCR_ENABLED=${OCR_PADDLEOCR_ENABLED:-true}
      - OCR_RETRY_MAX_ATTEMPTS=${OCR_RETRY_MAX_ATTEMPTS:-3}
      - OCR_RETRY_WAIT_MIN=${OCR_RETRY_WAIT_MIN:-1}
      - OCR_RETRY_WAIT_MAX=${OCR_RETRY_WAIT_MAX:-8}
      - TESSERACT_CMD=${TESSERACT_CMD:-/usr/bin/tesseract}
      - SIMSUN_PATH=${SIMSUN_PATH:-/usr/share/fonts/truetype/wqy/wqy-microhei.ttc}
      - PADDLE_PDX_CACHE_HOME=${PADDLE_PDX_CACHE_HOME:-/app/.paddlex_cache}
      - FLAGS_enable_pir_in_executor=${FLAGS_enable_pir_in_executor:-0}
      - FLAGS_enable_pir_api=${FLAGS_enable_pir_api:-0}
      # LangGraph Checkpointer 持久化（共享 PG 实例的 claimcraft_test_checkpoints 库）
      - CHECKPOINTER_DB_URL=postgresql://claimcraft_test:${CHECKPOINTER_PG_PASSWORD_TEST:-claimcraft_test_2025}@postgres-checkpointer:5432/claimcraft_test_checkpoints
      - CHECKPOINTER_POOL_SIZE=${CHECKPOINTER_POOL_SIZE:-20}
      # v3 新增：连接池调优参数
      - CHECKPOINTER_POOL_MIN_SIZE=${CHECKPOINTER_POOL_MIN_SIZE:-5}
      - CHECKPOINTER_POOL_TIMEOUT=${CHECKPOINTER_POOL_TIMEOUT:-5}
      - CHECKPOINTER_POOL_MAX_IDLE=${CHECKPOINTER_POOL_MAX_IDLE:-300}
      # LangSmith 观察配置（全链路 trace 追踪）
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-claimcraft-creative}
      - LANGSMITH_SAMPLING_RATE=${LANGSMITH_SAMPLING_RATE:-1}
      # v3 新增：LangSmith 区域与 Workspace
      - LANGSMITH_REGION=${LANGSMITH_REGION:-}
      - LANGSMITH_WORKSPACE_ID=${LANGSMITH_WORKSPACE_ID:-}
      # 邮件发送配置（Agent Mail CLI 优先，SMTP 兜底）
      - CLAIMCRAFT_MAIL_PROVIDER_ORDER=${CLAIMCRAFT_MAIL_PROVIDER_ORDER:-agent_cli,smtp}
      - CLAIMCRAFT_MAIL_DEFAULT_FROM_NAME=${CLAIMCRAFT_MAIL_DEFAULT_FROM_NAME:-ClaimCraft}
      - CLAIMCRAFT_MAIL_DEFAULT_FROM_EMAIL=${CLAIMCRAFT_MAIL_DEFAULT_FROM_EMAIL:-}
      - CLAIMCRAFT_MAIL_SEND_TIMEOUT_SECONDS=${CLAIMCRAFT_MAIL_SEND_TIMEOUT_SECONDS:-30}
      - CLAIMCRAFT_AGENT_MAIL_ENABLED=${CLAIMCRAFT_AGENT_MAIL_ENABLED:-true}
      - CLAIMCRAFT_AGENT_MAIL_COMMAND=${CLAIMCRAFT_AGENT_MAIL_COMMAND:-/usr/local/bin/agently-cli}
      - CLAIMCRAFT_AGENT_MAIL_HOME=${CLAIMCRAFT_AGENT_MAIL_HOME:-/app/.agently-home}
      - CLAIMCRAFT_LOG_DIR=${CLAIMCRAFT_LOG_DIR:-/app/logs}
      - CLAIMCRAFT_SMTP_ENABLED=${CLAIMCRAFT_SMTP_ENABLED:-true}
      - CLAIMCRAFT_SMTP_HOST=${CLAIMCRAFT_SMTP_HOST:-smtp.qq.com}
      - CLAIMCRAFT_SMTP_PORT=${CLAIMCRAFT_SMTP_PORT:-465}
      - CLAIMCRAFT_SMTP_USERNAME=${CLAIMCRAFT_SMTP_USERNAME:-}
      - CLAIMCRAFT_SMTP_PASSWORD=${CLAIMCRAFT_SMTP_PASSWORD:-}
      - CLAIMCRAFT_SMTP_USE_TLS=${CLAIMCRAFT_SMTP_USE_TLS:-false}
      - CLAIMCRAFT_SMTP_USE_SSL=${CLAIMCRAFT_SMTP_USE_SSL:-true}
      # v10 新增：Embedding 服务（RAG 知识库向量检索）
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-0}
      - EMBEDDING_VECTOR_DIM=${EMBEDDING_VECTOR_DIM:-1024}
      # v10 新增：RAG 检索配置
      - RAG_ENABLED=${RAG_ENABLED:-true}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_SCORE_THRESHOLD=${RAG_SCORE_THRESHOLD:-0.3}
      # v10 新增：Rerank 重排配置（Cross-Encoder 精排，未配置 API Key 时自动降级为 RRF 顺序截断）
      - RERANK_API_KEY=${RERANK_API_KEY:-}
      - RERANK_BASE_URL=${RERANK_BASE_URL:-https://api.siliconflow.cn/v1}
      - RERANK_MODEL=${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      - RERANK_TOP_N=${RERANK_TOP_N:-10}
      - RERANK_CANDIDATE_LIMIT=${RERANK_CANDIDATE_LIMIT:-50}
      - RERANK_SCORE_THRESHOLD=${RERANK_SCORE_THRESHOLD:-0.0}
      - RERANK_TIMEOUT=${RERANK_TIMEOUT:-30}
      - RERANK_MAX_RETRIES=${RERANK_MAX_RETRIES:-2}
      # v10 新增：Tools 工具集配置
      - TOOLS_ENABLED=${TOOLS_ENABLED:-true}
      - TOOLS_MAX_ITERATIONS=${TOOLS_MAX_ITERATIONS:-5}
      # v10 新增：法律知识库向量库连接（共享 PG 实例的 claimcraft_test_checkpoints 库）
      - LAW_VECTOR_DB_URL=postgresql://claimcraft_test:${CHECKPOINTER_PG_PASSWORD_TEST:-claimcraft_test_2025}@postgres-checkpointer:5432/claimcraft_test_checkpoints
    # DB 容器由 docker-compose.db.yml 托管，本 compose 通过 external network 接入
    # backend 启动时会用 restart: unless-stopped 重试，直到 DB 就绪
    command: >
      sh -c "mkdir -p /app/logs &&
             python manage.py migrate &&
             python manage.py shell -c \"from django.contrib.auth.models import User; user, created = User.objects.get_or_create(username='admin', defaults={'is_staff': True, 'is_superuser': True, 'email': ''}); user.is_staff = True; user.is_superuser = True; user.set_password('admin123'); user.save(); print('admin user ready')\" &&
             python manage.py loaddata seed_data.json || true &&
             exec uvicorn claimcraft.asgi:application --host 0.0.0.0 --port 8000 --workers 1 --log-config /app/logging_uvicorn.json"
    volumes:
      - media_data:/app/media
      - /srv/claimcraft/.agently-home-test:/app/.agently-home
      - paddlex_cache:/app/.paddlex_cache
      - /home/ubuntu/claimcraft-creative/logs/backend-test:/app/logs
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - default
      - claimcraft-db

  frontend:
    # 测试侧独立镜像 tag，重建不会覆盖正式侧 claimcraft-creative-frontend:YYYYMMDD
    image: claimcraft-test-frontend:latest
    container_name: claimcraft-test-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    volumes:
      - /home/ubuntu/claimcraft-creative/logs/frontend-test:/var/log/nginx
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  media_data:
  paddlex_cache:

networks:
  claimcraft-db:
    external: true
    name: claimcraft-db_default

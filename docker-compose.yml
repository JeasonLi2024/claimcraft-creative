version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: claimcraft
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-claimcraft_dev_2025}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${SECRET_KEY:-claimcraft-prod-secret-change-me}
      - DJANGO_ALLOWED_HOSTS=*
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=claimcraft
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-claimcraft_dev_2025}
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py shell -c \"from django.contrib.auth.models import User; User.objects.get_or_create(username='admin', defaults={'password':'admin123','is_staff':True,'is_superuser':True})\" &&
             python manage.py loaddata seed_data.json || true &&
             gunicorn claimcraft.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - media_data:/app/media
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  media_data:

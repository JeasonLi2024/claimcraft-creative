server {
    listen 80;
    server_name _;
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # 允许单张图片最大 10MB（与后端 MAX_IMAGE_SIZE 对齐），multipart 头开销预留 2MB
    client_max_body_size 12M;
    client_body_buffer_size 128k;
    client_body_timeout 60s;

    # 隐藏 nginx 版本号（部署加固）
    server_tokens off;

    # ===== gzip 压缩（文本资源 3-5× 传输缩减） =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-javascript
        application/x-www-form-urlencoded
        font/ttf
        font/otf
        font/woff
        application/font-woff
        application/vnd.ms-fontobject
        application/wasm
        image/svg+xml;

    # 前端 SPA 静态文件
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        # index.html 不缓存，保证发布后立即生效
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header X-Content-Type-Options nosniff always;
        }
    }

    # 带内容哈希的构建产物（Vite 输出 /assets/*.js|css 等）：永久强缓存
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options nosniff always;
        access_log off;
    }

    # 字体文件：1 年强缓存（分片 woff2 文件名含内容哈希，immutable 安全）
    location /fonts/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options nosniff always;
        access_log off;
    }

    # favicon 与小图标：30 天缓存
    location ~* ^/(favicon\.ico|favicon\.svg|icons\.svg|robots\.txt)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public" always;
        access_log off;
    }

    # 导出接口可能需要编译 LaTeX/Pandoc 并传输较大文件；关闭代理缓冲，
    # 避免响应被临时文件/缓存截断，并保留足够的公网请求超时时间。
    location ~ ^/api/cases/[0-9]+/export/(package|pdf|word)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        add_header X-Content-Type-Options nosniff always;
    }

    # API 反代到后端
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 工作流流式端点需要禁用缓冲并启用长连接
    location ~ ^/api/cases/[0-9]+/workflow/stream/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        gzip off;
    }

    # 媒体文件（用户上传图片）反代到后端
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # 静态文件（collectstatic 产物）反代到后端
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}

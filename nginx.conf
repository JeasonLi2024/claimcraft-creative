server {
    listen 80;
    server_name _;
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # 允许单张图片最大 10MB（与后端 MAX_IMAGE_SIZE 对齐），multipart 头开销预留 2MB
    client_max_body_size 12M;
    client_body_buffer_size 128k;
    client_body_timeout 60s;

    # 前端 SPA 静态文件
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # 导出接口可能需要编译 LaTeX/Pandoc 并传输较大文件；关闭代理缓冲，
    # 避免响应被临时文件/缓存截断，并保留足够的公网请求超时时间。
    location ~ ^/api/cases/[0-9]+/export/(package|pdf|word)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        add_header X-Content-Type-Options nosniff always;
    }

    # API 反代到后端
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 工作流流式端点需要禁用缓冲并启用长连接
    location ~ ^/api/cases/[0-9]+/workflow/stream/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        gzip off;
    }

    # 媒体文件（用户上传图片）反代到后端
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # 静态文件（collectstatic 产物）反代到后端
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
